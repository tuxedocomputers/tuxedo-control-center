<mat-toolbar>
    <!-- TITLE -->
    <mat-toolbar-row *ngIf="!inputActive && !currentProfile" class="title profile-options">
        <span>
            <ng-container i18n="@@cProfMgrTitle">Profiles</ng-container>
        </span>

        <div>
            <span class="info-options">
                <mat-button-toggle-group [(ngModel)]="viewDetails">
                    <mat-button-toggle [value]="false"
                        ><svg viewBox="0 0 512 512"><use href="./assets/images/icon_info.svg#Icon"></use></svg
                    ></mat-button-toggle>
                    <mat-button-toggle [value]="true"
                        ><svg viewBox="0 0 512 512"><use href="./assets/images/icon_dashboard.svg#Icon"></use></svg
                    ></mat-button-toggle>
                </mat-button-toggle-group>
            </span>
            <span>
                <mat-button-toggle-group [(ngModel)]="inputProfileFilter">
                    <mat-button-toggle value="all" i18n="@@cProfMgrFilterAll">All</mat-button-toggle>
                    <mat-button-toggle value="default" i18n="@@cProfMgrFilterPreset">Preset</mat-button-toggle>
                    <mat-button-toggle value="custom" i18n="@@cProfMgrFilterCustom">Custom</mat-button-toggle>
                    <mat-button-toggle value="used" i18n="@@cProfMgrFilterUsed">In use</mat-button-toggle>
                </mat-button-toggle-group>
            </span>

            <div class="menu-button">
                <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                    <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="exportProfiles()">
                        <mat-icon>save</mat-icon>

                        <span i18n="@@cProfMgrExportSettings">Export profile settings</span>
                    </button>
                    <button mat-menu-item (click)="importProfiles()">
                        <mat-icon>file_upload</mat-icon>

                        <span i18n="@@cProfMgrImportSettings">Import profile settings</span>
                    </button>
                </mat-menu>
            </div>
        </div>
    </mat-toolbar-row>

    <!-- NEW PROFILE -->
    <mat-toolbar-row *ngIf="inputActive">
        <form (ngSubmit)="onInputSubmit()">
            <mat-form-field class="profile-name-input">
                <mat-label>{{ inputProfileNameLabel }}</mat-label>
                <input matInput #inputFocus="matInput" type="text" [formControl]="inputProfileName" (keyup.esc)="cancelInput()" placeholder="Profile name" minLength="1" maxLength="50" />
            </mat-form-field>
            <button mat-stroked-button color="primary" i18n="@@cProfMgrSave" [disabled]="profileNameExist(inputFocus.value)">Save</button>
            <button mat-stroked-button color="basic" (click)="cancelInput()" i18n="@@cProfMgrCancel">Cancel</button>
        </form>
    </mat-toolbar-row>
</mat-toolbar>

<div class="profile-manager-content" [ngClass]="{ offset: !currentProfile }" #profileManagerContent>
    <div class="inner-profile-manager-content">
        <div *ngIf="!currentProfile">
            <app-profile-overview-tile
                *ngFor="let profile of getProfilesForList()"
                [profile]="profile"
                [hoverEffect]="false"
                [active]="isProfileActive(profile.id)"
                [used]="isProfileUsed(profile.id)"
                (copyClick)="copyProfile($event)"
                [showDetails]="viewDetails">
            </app-profile-overview-tile>
            <app-profile-overview-tile *ngIf="['all', 'custom'].includes(inputProfileFilter)" [addProfileTile]="true" [hoverEffect]="true" (click)="buttonNew.click()"> </app-profile-overview-tile>
        </div>
    </div>
</div>
<app-profile-details-edit #profileDetailsEdit *ngIf="currentProfile !== undefined" [profile]="currentProfile" (scrollTo)="profileManagerContent.scrollTo({ top: $event, behavior: 'smooth' })">
</app-profile-details-edit>
